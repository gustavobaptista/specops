<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">SpecOps — autonomous AI engineering squad</title>
  <desc id="d">A pipeline of AI agents: discovery → architect → ui-designer (for UI features) → planner → parallel implementers → QA → reviewer → a merged PR, with an automatic QA and review loop, plus on-demand auditor, investigator and guardian roles.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#58A6FF"/></marker>
    <marker id="arrm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#8B949E"/></marker>
  </defs>

  <!-- card -->
  <rect x="6" y="6" width="1188" height="588" rx="18" fill="#0D1117" stroke="#30363D" stroke-width="1.5"/>

  <!-- header -->
  <text x="60" y="84" font-size="52" font-weight="800" letter-spacing="-1" fill="#E6EDF3">Spec<tspan fill="#58A6FF">Ops</tspan></text>
  <text x="60" y="116" font-size="19" fill="#8B949E">An autonomous squad of AI engineers — from spec to merged PR.</text>

  <!-- section label -->
  <circle cx="64" cy="198" r="4" fill="#58A6FF"/>
  <text x="78" y="203" font-size="13" font-weight="700" letter-spacing="2" fill="#8B949E">PIPELINE</text>

  <!-- connectors -->
  <g stroke="#58A6FF" stroke-width="2">
    <line x1="180" y1="268" x2="198" y2="268" marker-end="url(#arr)"/>
    <line x1="321" y1="268" x2="339" y2="268" marker-end="url(#arr)"/>
    <line x1="462" y1="268" x2="480" y2="268" marker-end="url(#arr)"/>
    <line x1="603" y1="268" x2="621" y2="268" marker-end="url(#arr)"/>
    <line x1="744" y1="268" x2="762" y2="268" marker-end="url(#arr)"/>
    <line x1="885" y1="268" x2="903" y2="268" marker-end="url(#arr)"/>
    <line x1="1026" y1="268" x2="1047" y2="268" marker-end="url(#arr)"/>
  </g>

  <!-- loop: reviewer (c7) back to implementer (c5) -->
  <path d="M964.5 306 C 964.5 384, 682.5 384, 682.5 308" fill="none" stroke="#8B949E" stroke-width="2" stroke-dasharray="5 5" marker-end="url(#arrm)"/>
  <text x="823.5" y="376" font-size="13" fill="#8B949E" text-anchor="middle">auto QA + review loop · fixes on the existing branch</text>

  <!-- parallel stack hint behind implementer (c5 front x624 y232) — fans up-right -->
  <rect x="636" y="220" width="117" height="72" rx="12" fill="#11161F" stroke="#30363D"/>
  <rect x="630" y="226" width="117" height="72" rx="12" fill="#131922" stroke="#30363D"/>

  <!-- chips -->
  <g>
    <!-- c1 discovery -->
    <rect x="60" y="232" width="117" height="72" rx="12" fill="#161B22" stroke="#30363D"/>
    <text x="118.5" y="263" font-size="16" font-weight="600" fill="#E6EDF3" text-anchor="middle">discovery</text>
    <text x="118.5" y="283" font-size="12" fill="#8B949E" text-anchor="middle">the "why"</text>
    <text x="118.5" y="329" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#79C0FF" text-anchor="middle">brief.md</text>

    <!-- c2 architect -->
    <rect x="201" y="232" width="117" height="72" rx="12" fill="#161B22" stroke="#30363D"/>
    <text x="259.5" y="263" font-size="16" font-weight="600" fill="#E6EDF3" text-anchor="middle">architect</text>
    <text x="259.5" y="283" font-size="12" fill="#8B949E" text-anchor="middle">the design</text>
    <text x="259.5" y="329" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#79C0FF" text-anchor="middle">spec.md</text>

    <!-- c3 ui-designer (conditional) -->
    <rect x="342" y="232" width="117" height="72" rx="12" fill="#161B22" stroke="#30363D"/>
    <text x="400.5" y="263" font-size="16" font-weight="600" fill="#E6EDF3" text-anchor="middle">ui-designer</text>
    <text x="400.5" y="283" font-size="12" fill="#8B949E" text-anchor="middle">if UI</text>
    <text x="400.5" y="329" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#79C0FF" text-anchor="middle">ui-spec.md</text>

    <!-- c4 planner -->
    <rect x="483" y="232" width="117" height="72" rx="12" fill="#161B22" stroke="#30363D"/>
    <text x="541.5" y="263" font-size="16" font-weight="600" fill="#E6EDF3" text-anchor="middle">planner</text>
    <text x="541.5" y="283" font-size="12" fill="#8B949E" text-anchor="middle">atomic tasks</text>
    <text x="541.5" y="329" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#79C0FF" text-anchor="middle">tasks.md</text>

    <!-- c5 implementer (parallel) -->
    <rect x="624" y="232" width="117" height="72" rx="12" fill="#161B22" stroke="#58A6FF"/>
    <text x="682.5" y="263" font-size="16" font-weight="600" fill="#E6EDF3" text-anchor="middle">implementer</text>
    <text x="682.5" y="283" font-size="12" fill="#8B949E" text-anchor="middle">×N · parallel</text>
    <text x="682.5" y="329" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#79C0FF" text-anchor="middle">code · tests</text>

    <!-- c6 qa -->
    <rect x="765" y="232" width="117" height="72" rx="12" fill="#161B22" stroke="#30363D"/>
    <text x="823.5" y="263" font-size="16" font-weight="600" fill="#E6EDF3" text-anchor="middle">qa</text>
    <text x="823.5" y="283" font-size="12" fill="#8B949E" text-anchor="middle">the gate</text>
    <text x="823.5" y="329" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#79C0FF" text-anchor="middle">rules ✓</text>

    <!-- c7 reviewer -->
    <rect x="906" y="232" width="117" height="72" rx="12" fill="#161B22" stroke="#30363D"/>
    <text x="964.5" y="263" font-size="16" font-weight="600" fill="#E6EDF3" text-anchor="middle">reviewer</text>
    <text x="964.5" y="283" font-size="12" fill="#8B949E" text-anchor="middle">blockers</text>
    <text x="964.5" y="329" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#79C0FF" text-anchor="middle">PR review</text>

    <!-- terminal -->
    <rect x="1050" y="232" width="90" height="72" rx="12" fill="#10261A" stroke="#3FB950"/>
    <text x="1095" y="275" font-size="18" font-weight="700" fill="#3FB950" text-anchor="middle">✓ PR</text>
  </g>

  <!-- operational -->
  <circle cx="64" cy="452" r="4" fill="#8B949E"/>
  <text x="78" y="457" font-size="13" font-weight="700" letter-spacing="2" fill="#8B949E">ON DEMAND</text>
  <g>
    <rect x="60" y="470" width="190" height="44" rx="10" fill="#11161F" stroke="#30363D"/>
    <text x="155" y="497" font-size="15" fill="#C9D1D9" text-anchor="middle">auditor · security</text>
    <rect x="266" y="470" width="190" height="44" rx="10" fill="#11161F" stroke="#30363D"/>
    <text x="361" y="497" font-size="15" fill="#C9D1D9" text-anchor="middle">investigator · incidents</text>
    <rect x="472" y="470" width="190" height="44" rx="10" fill="#11161F" stroke="#30363D"/>
    <text x="567" y="497" font-size="15" fill="#C9D1D9" text-anchor="middle">guardian · deploys</text>
  </g>

  <!-- footer -->
  <text x="1140" y="498" font-size="14" fill="#C9D1D9" text-anchor="end">stack-agnostic · config-driven</text>
  <text x="1140" y="520" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#8B949E" text-anchor="end">runs in Claude Code</text>

  <!-- bottom rule + url -->
  <line x1="60" y1="548" x2="1140" y2="548" stroke="#21262D"/>
  <text x="60" y="572" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#8B949E">github.com/gustavobaptista/specops</text>
</svg>

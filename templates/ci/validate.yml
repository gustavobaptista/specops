name: Validate (CI)

# spec-driven-squad — PLAIN CI. This is NOT agentic: ordinary lint / build / test.
# It carries no Claude/token cost — it's here so the repo has a sane gate out of the box.
# Fill in YOUR stack's commands per subproject (or let /sdd-init generate it from the
# project-profile). Delete the subprojects you don't have; add a job per subproject for
# clean parallelism, or use a matrix.

on:
  pull_request:
    branches: [develop, staging, main]

concurrency:
  group: validate-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint · Build · Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
